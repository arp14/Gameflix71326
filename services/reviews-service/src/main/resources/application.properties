spring.application.name=reviews-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/reviews_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Same JWT_SECRET as auth-service - this service only validates tokens,
# never issues them.
jwt.secret=${JWT_SECRET}

# Base URL of games-service, called to confirm a game exists before
# saving a review against it (see GamesClient).
games.service.url=${GAMES_SERVICE_URL:http://localhost:8082}
