spring.application.name=gameflix

spring.datasource.url=${DB_URL:jdbc:mysql://w2-vmistserver.ad.psu.edu:3306/gameflix}
spring.datasource.username=${DB_USERNAME:arp14}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT signing secret - required env var, no default (must be >= 32 chars / 256 bits
# for HS256; the app fails fast at startup if it's too short or unset).
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
