name: Build, Test, and Package

on:
  push:
    branches: ["**"]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Ephemeral MySQL for this job only - GameflixApplicationTests boots a
    # full Spring context that needs a real database. The runner has no
    # network path to the real w2-vmistserver.ad.psu.edu (Penn State
    # internal server), so tests need their own throwaway DB instead.
    # These credentials only exist for this container's ~1 minute
    # lifetime and are never reachable outside the runner, so they're not
    # meaningful secrets - unlike the registry login below, which uses a
    # real secret (secrets.GITHUB_TOKEN).
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: gameflix
          MYSQL_USER: gameflix_app
          MYSQL_PASSWORD: ci_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Fail-fast: if tests fail, the job stops here and the later
      # build/image steps never run.
      - name: Run tests
        env:
          DB_URL: jdbc:mysql://localhost:3306/gameflix
          DB_USERNAME: gameflix_app
          DB_PASSWORD: ci_test_password
          JWT_SECRET: ci-test-only-secret-value-32chars-minimum-length
        run: mvn -B test

      - name: Build jar
        run: mvn -B package -DskipTests

      # Docker image names must be all-lowercase; github.repository
      # (arp14/Gameflix71326) has a capital G, so it can't be used as-is.
      - name: Compute lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Deploy (stub)
        run: |
          echo "Deploy step (stub) - no real target environment configured yet."
          echo "Would deploy ${IMAGE_NAME}:${GITHUB_SHA} here, e.g.:"
          echo "  ssh <deploy-host> 'docker pull ${IMAGE_NAME}:${GITHUB_SHA} && docker compose up -d'"
